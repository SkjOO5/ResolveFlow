environment:
  name: "ResolveFlow"
  id: "OpenSupportEnv-v1.0"
  description: "A realistic benchmark for evaluating autonomous agents on customer support operations, including issue classification, policy-grounded resolution, internal context retrieval, and safe customer communication."
  version: "1.0.0"
  authors: ["Antigravity"]
  tags:
    - "RL"
    - "Customer Support"
    - "Workflow Orchestration"
    - "Decision Making"
    - "Policy Adherence"

tasks:
  - id: "task_001_easy"
    description: "Damaged item refund tracking straightforward policy application."
  - id: "task_002_medium"
    description: "Delayed shipment requiring SLA evaluation and store credit issuance."
  - id: "task_003_hard"
    description: "High-value suspected fraud requiring multi-tool lookup and escalation bounds."

endpoints:
  reset: "/api/reset"
  step: "/api/step"
  state: "/api/state"
  health: "/health"

schemas:
  observation: "Observation (JSON)"
  action: "Action (JSON)"
  reward: "Reward (JSON)"

runtime:
  port: 7860  # Supports env var override
  docker_compatible: true
  hf_spaces_compatible: true
