environment:
  name: "ResolveFlow"
  id: "OpenSupportEnv-v1.0"
  description: "A realistic benchmark for evaluating autonomous agents on customer support operations, including issue classification, policy-grounded resolution, internal context retrieval, and safe customer communication."
  version: "1.0.0"
  authors: ["Antigravity"]
  tags:
    - "RL"
    - "Customer Support"
    - "Workflow Orchestration"
    - "Decision Making"
    - "Policy Adherence"

server:
  entry_point: "server.app:main"
  module: "server.app"
  function: "main"
  host: "0.0.0.0"
  port: 7860

tasks:
  - id: "task_001_easy"
    difficulty: "easy"
    max_steps: 10
    description: "Damaged item refund — straightforward policy-aligned resolution requiring classification, optional tool lookups, and a terminal refund or replacement action."
  - id: "task_002_medium"
    difficulty: "medium"
    max_steps: 15
    description: "Delayed shipment — agent must inspect shipping SLA data and return policy before issuing a bounded courtesy credit. Full refunds are prohibited."
  - id: "task_003_hard"
    difficulty: "hard"
    max_steps: 20
    description: "High-value suspected fraud — agent must retrieve account, refund history, billing anomalies, and policy before concluding the case requires human escalation. No refund or replacement is permitted."

reward:
  range: [0.0, 1.0]
  type: "dense"
  description: "Per-step partial rewards for useful tool calls, classification accuracy, and response quality. Terminal grader produces a normalized final score."

grader:
  type: "deterministic"
  dimensions:
    - classification
    - priority
    - tool_usage
    - policy_compliance
    - resolution
    - response_quality
    - efficiency

endpoints:
  reset: "/reset"
  step: "/step"
  state: "/state"
  tasks: "/tasks"
  health: "/health"

schemas:
  observation: "Observation (JSON)"
  action: "Action (JSON)"
  reward: "Reward (JSON)"

runtime:
  port: 7860  # Supports env var override
  docker_compatible: true
  hf_spaces_compatible: true
