<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResolveFlow Operations Console</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <h1>ResolveFlow</h1>
            <span class="version-badge">OpenSupportEnv v1.0</span>
        </div>
        <div class="header-right">
            <span class="status-badge" id="system-status">System: Online</span>
        </div>
    </header>

    <main class="dashboard">
        <div class="left-panel">
            <section class="card task-selector">
                <div class="card-header">
                    <h2>Active Investigation</h2>
                    <div class="task-controls">
                        <select id="task-select" class="input-select">
                            <option value="task_001_easy">Easy - Damaged Item</option>
                            <option value="task_002_medium">Medium - Delivery Delay</option>
                            <option value="task_003_hard">Hard - Suspected Fraud</option>
                        </select>
                        <button id="reset-btn" class="btn warning">Reset Environment</button>
                    </div>
                </div>
            </section>

            <section class="card observation-panel">
                <div class="card-header"><h2>Current Ticket State</h2></div>
                <div class="ticket-header">
                    <span class="badge diff-badge" id="diff-badge">Difficulty: -</span>
                    <span class="badge step-badge" id="step-badge">Step: 0 / 10</span>
                </div>
                
                <div class="field-group">
                    <label>Customer Message</label>
                    <div class="chat-bubble user" id="obs-message">Waiting constraint...</div>
                </div>

                <div class="field-group">
                    <label>Visible Metadata</label>
                    <pre class="json-block" id="obs-meta">{}</pre>
                </div>

                <div class="field-group" id="context-container" style="display:none;">
                    <label>Revealed Tool Context</label>
                    <pre class="json-block highlight" id="obs-context">{}</pre>
                </div>
            </section>

            <section class="card action-panel">
                <div class="card-header"><h2>Agent Actions Console</h2></div>
                <div class="action-form">
                    <label for="action-type">Action Type</label>
                    <select id="action-type" class="input-select">
                        <option value="classify_ticket">classify_ticket</option>
                        <option value="set_priority">set_priority</option>
                        <option value="request_account_details">request_account_details</option>
                        <option value="request_order_history">request_order_history</option>
                        <option value="request_shipping_status">request_shipping_status</option>
                        <option value="request_refund_history">request_refund_history</option>
                        <option value="request_return_policy">request_return_policy</option>
                        <option value="request_billing_history">request_billing_history</option>
                        <option value="draft_response">draft_response</option>
                        <option value="offer_store_credit">offer_store_credit</option>
                        <option value="offer_replacement">offer_replacement</option>
                        <option value="issue_refund">issue_refund</option>
                        <option value="escalate_to_human">escalate_to_human</option>
                        <option value="close_ticket">close_ticket</option>
                    </select>

                    <label for="action-payload" style="margin-top: 15px;">Payload (JSON)</label>
                    <textarea id="action-payload" class="input-textarea" rows="4">{}</textarea>
                    
                    <button id="step-btn" class="btn primary full-width">Execute Action</button>
                    <div id="action-error" class="error-msg"></div>
                </div>
            </section>
        </div>

        <div class="right-panel">
            <section class="card metrics-card">
                <div class="metric-block">
                    <div class="metric-label">Cumulative Reward</div>
                    <div class="metric-value" id="total-reward">0.00</div>
                </div>
                <div class="metric-block">
                    <div class="metric-label">Latest ∆</div>
                    <div class="metric-value small" id="last-reward">+0.00</div>
                </div>
            </section>
            
            <section class="card done-card" id="done-panel" style="display: none;">
                <div class="card-header"><h2>Terminal Evaluation</h2></div>
                <div class="eval-score" id="final-score-val">0.0</div>
                <div class="eval-summary" id="final-summary"></div>
            </section>

            <section class="card history-panel">
                <div class="card-header"><h2>Action Timeline</h2></div>
                <div class="timeline" id="action-timeline">
                    <div class="empty-state">No actions taken yet.</div>
                </div>
            </section>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
